{% extends "base.html" %}

{% block title %}تسجيل الدخول - القلعة نت{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h1 class="h3 fw-bold">
                            <i class="fas fa-tower-cell text-primary"></i> القلعة نت
                        </h1>
                        <p class="text-muted">نظام إدارة المهام والصيانة</p>
                    </div>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label">اسم المستخدم</label>
                            <input type="text" class="form-control form-control-lg" id="username" name="username" required autofocus>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">كلمة المرور</label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password" required>
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label" for="remember">تذكر بيانات الدخول</label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
                        </button>
                    </form>
                    
                    <hr class="my-4">
                    
                    <p class="text-center text-muted">
                        ليس لديك حساب؟ <a href="#">إنشاء حساب جديد</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
